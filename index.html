<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>SK Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f0f2f7;}
#app{display:flex;flex-direction:column;height:100vh;}
.topbar{background:#1a1d2e;padding:14px;color:#fff;text-align:center;font-size:18px;font-weight:700;flex-shrink:0;}
.screen{display:none;flex:1;overflow-y:auto;padding:20px;}
.screen.active{display:block;}
.btn{background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px 20px;margin-bottom:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%;text-align:left;}
</style>
</head>
<body>
<div id="app">
<div class="topbar">SK Events v3.1</div>
<div id="screen-home" class="screen active">
  <button class="btn" onclick="goTo('event')">+ New Event</button>
  <button class="btn" onclick="goTo('events')">Open Existing Event</button>
  <button class="btn" onclick="goTo('settings')">App Settings</button>
</div>
<div id="screen-event" class="screen">
  <button class="btn" onclick="goTo('home')">Back to Home</button>
  <p style="margin-top:20px;">Event screen works!</p>
</div>
<div id="screen-settings" class="screen">
  <button class="btn" onclick="goTo('home')">Back to Home</button>
  <p style="margin-top:20px;">Settings works!</p>
</div>
<div id="screen-events" class="screen">
  <button class="btn" onclick="goTo('home')">Back to Home</button>
  <p style="margin-top:20px;">Events list works!</p>
</div>
</div>
<script>
function goTo(name) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) {
    all[i].classList.remove('active');
  }
  var target = document.getElementById('screen-' + name);
  if (target) target.classList.add('active');
}
</script>
</body>
</html>
