<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>SK Debug v1</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f0f2f7;}
button{display:block;width:100%;padding:16px;margin-bottom:12px;background:#4a5da8;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
#log{background:#1a1d2e;color:#4fc3a1;padding:14px;border-radius:10px;font-size:12px;font-family:monospace;min-height:100px;white-space:pre-wrap;margin-top:20px;}
</style>
</head>
<body>
<h2>SK Debug</h2>
<button onclick="log('Button 1 tapped!')">Test Button 1</button>
<button onclick="log('Button 2 tapped!')">Test Button 2</button>
<button onclick="testLS()">Test localStorage</button>
<button onclick="testFetch()">Test fetch()</button>
<button onclick="testAll()">Run Full App Init Test</button>
<div id="log">Tap buttons to test...\n</div>

<script>
var logEl = document.getElementById('log');
function log(msg) {
  logEl.textContent += msg + '\n';
}

window.onerror = function(msg, src, line, col, err) {
  log('GLOBAL ERROR: ' + msg + ' (line ' + line + ')');
  return false;
};

log('Page loaded');
log('Safari: ' + (navigator.userAgent.indexOf('Safari') > -1));
log('iOS: ' + (navigator.userAgent.indexOf('iPhone') > -1 || navigator.userAgent.indexOf('iPad') > -1));

function testLS() {
  try {
    localStorage.setItem('sk_test', '123');
    var v = localStorage.getItem('sk_test');
    log('localStorage OK: ' + v);
    localStorage.removeItem('sk_test');
  } catch(e) {
    log('localStorage FAIL: ' + e.message);
  }
}

function testFetch() {
  log('Testing fetch...');
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=New+York')
    .then(function(r){ return r.json(); })
    .then(function(d){ log('fetch OK: got ' + d.length + ' results'); })
    .catch(function(e){ log('fetch FAIL: ' + e.message); });
}

function testAll() {
  log('--- Full init test ---');
  try {
    // Simulate what our app does
    log('1. localStorage read...');
    var contacts = localStorage.getItem('sk_contacts_v2');
    log('   contacts: ' + (contacts ? 'found' : 'null'));
    
    log('2. JSON parse...');
    if (contacts) JSON.parse(contacts);
    log('   OK');
    
    log('3. DOM manipulation...');
    var el = document.createElement('div');
    el.classList.add('test');
    el.classList.remove('test');
    log('   classList OK');
    
    log('4. classList.toggle...');
    el.classList.toggle('test');
    log('   toggle(1 arg) OK');
    
    // This was the suspected bug:
    el.classList.toggle('test', true);
    log('   toggle(2 args, true) OK');
    el.classList.toggle('test', false);
    log('   toggle(2 args, false) OK');
    
    log('5. Array.forEach...');
    var arr = ['a','b','c'];
    arr.forEach(function(x){ });
    log('   OK');
    
    log('6. Object.keys...');
    var obj = {a:1, b:2};
    Object.keys(obj).forEach(function(k){ });
    log('   OK');
    
    log('--- ALL TESTS PASSED ---');
  } catch(e) {
    log('FAILED at: ' + e.message);
    log('Stack: ' + (e.stack || 'none'));
  }
}

// Auto-run basic tests
window.addEventListener('DOMContentLoaded', function() {
  log('DOMContentLoaded fired');
  testLS();
});
</script>

</body>
</html>
